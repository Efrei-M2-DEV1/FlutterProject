include: package:flutter_lints/flutter.yaml

linter:
  rules:
    prefer_const_constructors: true
    avoid_print: true
    always_declare_return_types: true
    unnecessary_this: true
    unnecessary_underscores: false  # Désactivé

analyzer:
  errors:
    use_build_context_synchronously: warning  # Ne bloque plus la CI, juste warning
